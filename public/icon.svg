<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0fb5a8"/>
      <stop offset="100%" stop-color="#0a8a80"/>
    </linearGradient>
    <linearGradient id="wave" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.7"/>
    </linearGradient>
  </defs>
  <!-- rounded square background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- three stylized tide waves -->
  <path d="M 96 300 Q 176 240 256 300 T 416 300" fill="none" stroke="url(#wave)" stroke-width="28" stroke-linecap="round"/>
  <path d="M 96 360 Q 176 300 256 360 T 416 360" fill="none" stroke="url(#wave)" stroke-width="28" stroke-linecap="round" opacity="0.7"/>
  <path d="M 96 240 Q 176 180 256 240 T 416 240" fill="none" stroke="url(#wave)" stroke-width="28" stroke-linecap="round" opacity="0.5"/>
  <!-- focus dot in center -->
  <circle cx="256" cy="160" r="20" fill="#ffffff"/>
</svg>
