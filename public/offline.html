<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FocusTide — Offline</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #0a0f14;
      color: #e6f7f5;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      padding: 1.5rem;
    }
    .card {
      max-width: 28rem;
      text-align: center;
      padding: 2.5rem 2rem;
      border-radius: 1rem;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
    }
    .icon {
      width: 64px; height: 64px;
      margin: 0 auto 1.25rem;
      display: grid; place-items: center;
      border-radius: 16px;
      background: linear-gradient(135deg, #0fb5a8, #0a8a80);
      font-size: 32px;
    }
    h1 { font-size: 1.5rem; margin: 0 0 0.5rem; font-weight: 600; }
    p { color: rgba(230,247,245,0.7); line-height: 1.6; margin: 0.5rem 0 0; font-size: 0.95rem; }
    button {
      margin-top: 1.5rem;
      padding: 0.625rem 1.5rem;
      border-radius: 0.5rem;
      border: none;
      background: #0fb5a8;
      color: #fff;
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #0ca399; }
    .hint { margin-top: 1.5rem; font-size: 0.75rem; color: rgba(230,247,245,0.4); }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🌊</div>
    <h1>You're offline</h1>
    <p>FocusTide runs locally in your browser, but the app shell hasn't been cached yet. Once you've loaded the app once while online, it works fully offline — no connection needed.</p>
    <button onclick="window.location.reload()">Try again</button>
    <div class="hint">Your data is safe in this browser.</div>
  </div>
</body>
</html>
